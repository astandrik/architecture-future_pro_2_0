version: "2026-06-01"
company: "Будущее 2.0"
method: "Technology radar as code"
rings:
  - id: adopt
    name: "Adopt"
    meaning: "Recommended for broad use in target architecture"
  - id: trial
    name: "Trial"
    meaning: "Controlled production pilots; expand after evidence"
  - id: assess
    name: "Assess"
    meaning: "Promising investment area, assess through prototypes and ADR/RFC"
  - id: hold
    name: "Hold"
    meaning: "Do not use for new initiatives, keep only for migration or retirement"
quadrants:
  - "Platforms"
  - "Data & Analytics"
  - "Integration & Delivery"
  - "Methods & Governance"
technologies:
  - id: yandex-cloud
    name: "Yandex Cloud"
    ring: "Adopt"
    quadrant: "Platforms"
    movement: "new"
    owner: "Enterprise Architect"
    review_horizon: "6 месяцев"
    rationale: "Base cloud platform for scalable data infrastructure, managed services and regulatory fit."
    risk: "Vendor lock-in and region-specific regulatory constraints."
    business_impact: "Reduces infrastructure lead time and supports regional expansion."
  - id: terraform
    name: "Terraform"
    ring: "Adopt"
    quadrant: "Integration & Delivery"
    movement: "stable"
    owner: "Platform Lead"
    review_horizon: "6 месяцев"
    rationale: "Used for reproducible infrastructure, remote state and reviewable changes."
    risk: "State and secrets must be controlled through CI variables and remote backend."
    business_impact: "Reduces manual provisioning errors and speeds environment creation."
  - id: gitlab-ci
    name: "GitLab CI"
    ring: "Adopt"
    quadrant: "Integration & Delivery"
    movement: "stable"
    owner: "Platform Lead"
    review_horizon: "6 месяцев"
    rationale: "Supports fmt, validate, plan and manual apply for Terraform changes."
    risk: "Weak approval rules can let unsafe infrastructure changes reach production."
    business_impact: "Creates repeatable delivery controls for cloud changes."
  - id: object-storage
    name: "Yandex Object Storage"
    ring: "Adopt"
    quadrant: "Platforms"
    movement: "new"
    owner: "Data Platform Lead"
    review_horizon: "6 месяцев"
    rationale: "S3-compatible base for remote state and Data Lakehouse storage."
    risk: "Cost growth from hundreds of TB without lifecycle policies."
    business_impact: "Enables scalable storage for analytics and data products."
  - id: apache-iceberg
    name: "Apache Iceberg"
    ring: "Adopt"
    quadrant: "Data & Analytics"
    movement: "new"
    owner: "Data Platform Lead"
    review_horizon: "6 месяцев"
    rationale: "Table format for Lakehouse with schema evolution, partitioning and transactional metadata."
    risk: "Requires data engineering discipline and compatible engines."
    business_impact: "Supports reliable BI and AI workloads over shared object storage."
  - id: nessie
    name: "Nessie"
    ring: "Trial"
    quadrant: "Data & Analytics"
    movement: "new"
    owner: "Data Platform Lead"
    review_horizon: "3 месяца"
    rationale: "Catalog and versioning layer for Iceberg tables queried through Dremio."
    risk: "Operational maturity must be proven before all critical domains depend on it."
    business_impact: "Improves reproducibility and rollback for analytical datasets."
  - id: dremio
    name: "Dremio"
    ring: "Trial"
    quadrant: "Data & Analytics"
    movement: "new"
    owner: "Self-Service Analytics Lead"
    review_horizon: "3 месяца"
    rationale: "Self-service SQL layer for analysts over Lakehouse data products."
    risk: "Compute cost and query performance can grow without workload governance."
    business_impact: "Reduces report lead time from hours toward interactive analytics."
  - id: datahub
    name: "DataHub"
    ring: "Adopt"
    quadrant: "Methods & Governance"
    movement: "new"
    owner: "Data Governance Lead"
    review_horizon: "6 месяцев"
    rationale: "Catalog for owners, glossary, lineage and access workflow in the target data platform."
    risk: "Low adoption if domain owners do not maintain metadata."
    business_impact: "Makes data products discoverable and auditable."
  - id: airflow
    name: "Apache Airflow"
    ring: "Trial"
    quadrant: "Integration & Delivery"
    movement: "new"
    owner: "Data Platform Lead"
    review_horizon: "3 месяца"
    rationale: "ELT orchestration for batch migration, quality checks and metadata ingestion."
    risk: "Can become a central bottleneck if all domains depend on one team."
    business_impact: "Creates controlled data-product publishing workflows."
  - id: kafka-streaming
    name: "Kafka-compatible streaming"
    ring: "Trial"
    quadrant: "Integration & Delivery"
    movement: "new"
    owner: "Event Platform Lead"
    review_horizon: "3 месяца"
    rationale: "Target foundation for domain events and near-real-time processing."
    risk: "Throughput, ordering and consumer lag need capacity testing."
    business_impact: "Enables weak coupling between clinics, fintech, AI and partners."
  - id: schema-registry
    name: "Schema Registry"
    ring: "Adopt"
    quadrant: "Integration & Delivery"
    movement: "new"
    owner: "Event Platform Lead"
    review_horizon: "6 месяцев"
    rationale: "Mandatory guardrail for versioned domain event contracts."
    risk: "Bypass by teams publishing unregistered messages."
    business_impact: "Reduces integration breakage and accelerates partner onboarding."
  - id: dlq
    name: "DLQ"
    ring: "Adopt"
    quadrant: "Integration & Delivery"
    movement: "new"
    owner: "SRE Lead"
    review_horizon: "6 месяцев"
    rationale: "Required reliability pattern for invalid events and legacy translations."
    risk: "Unowned DLQ backlog hides integration failures."
    business_impact: "Protects critical workflows during migration."
  - id: cdc
    name: "CDC"
    ring: "Adopt"
    quadrant: "Integration & Delivery"
    movement: "new"
    owner: "Migration Lead"
    review_horizon: "6 месяцев"
    rationale: "Safe bridge from SQL Server 2008 DWH to the event and data platform."
    risk: "Incorrect classification can leak sensitive legacy data."
    business_impact: "Allows phased migration without big-bang cutover."
  - id: data-transfer
    name: "Yandex Data Transfer"
    ring: "Trial"
    quadrant: "Platforms"
    movement: "new"
    owner: "Migration Lead"
    review_horizon: "3 месяца"
    rationale: "Managed migration and replication service to reduce custom data movers."
    risk: "Connector support must be validated for real legacy sources."
    business_impact: "Reduces migration engineering effort and downtime."
  - id: openlineage
    name: "OpenLineage"
    ring: "Assess"
    quadrant: "Methods & Governance"
    movement: "new"
    owner: "Data Governance Lead"
    review_horizon: "6 месяцев"
    rationale: "Potential standard for collecting lineage across Airflow, Spark-like jobs and downstream analytics tools."
    risk: "May duplicate DataHub-native lineage if introduced without a clear integration model."
    business_impact: "Can improve auditability for regulated data flows and AI datasets."
  - id: mlflow-model-registry
    name: "MLflow Model Registry"
    ring: "Assess"
    quadrant: "Data & Analytics"
    movement: "new"
    owner: "AI Domain Owner"
    review_horizon: "6 месяцев"
    rationale: "Candidate for model lifecycle tracking before AI services become monetized products."
    risk: "Adds process and platform overhead before model governance requirements are mature."
    business_impact: "Supports reproducibility, approval and rollback for AI medical services."
  - id: managed-postgresql
    name: "Managed PostgreSQL"
    ring: "Adopt"
    quadrant: "Platforms"
    movement: "new"
    owner: "Platform Lead"
    review_horizon: "6 месяцев"
    rationale: "Managed relational storage for platform metadata and supporting services."
    risk: "Backups, retention and HA sizing must be cost-controlled."
    business_impact: "Reduces operational burden for platform metadata stores."
  - id: managed-kubernetes
    name: "Managed Kubernetes"
    ring: "Trial"
    quadrant: "Platforms"
    movement: "new"
    owner: "SRE Lead"
    review_horizon: "3 месяца"
    rationale: "Runtime option for DataHub, Dremio, Airflow and platform services."
    risk: "Cluster sprawl and overprovisioned nodes increase cloud spend."
    business_impact: "Provides repeatable runtime for self-service platform components."
  - id: python
    name: "Python"
    ring: "Adopt"
    quadrant: "Data & Analytics"
    movement: "stable"
    owner: "AI Domain Owner"
    review_horizon: "6 месяцев"
    rationale: "Existing AI services use Python and it remains standard for ML/data tooling."
    risk: "Model lineage and dependency management must be governed."
    business_impact: "Supports AI service monetization and clinical decision support."
  - id: golang
    name: "Go"
    ring: "Adopt"
    quadrant: "Integration & Delivery"
    movement: "stable"
    owner: "Fintech Domain Owner"
    review_horizon: "6 месяцев"
    rationale: "Existing fintech services use Go and it suits high-throughput services."
    risk: "Banking compliance and observability must be standardized."
    business_impact: "Supports fintech product delivery and integration speed."
  - id: java
    name: "Java"
    ring: "Adopt"
    quadrant: "Integration & Delivery"
    movement: "stable"
    owner: "Fintech Domain Owner"
    review_horizon: "6 месяцев"
    rationale: "Existing fintech services use Java and the ecosystem is mature."
    risk: "Old framework versions must not become a hidden legacy layer."
    business_impact: "Keeps current banking capabilities while platform integration evolves."
  - id: power-bi-domain
    name: "Power BI over governed marts"
    ring: "Trial"
    quadrant: "Data & Analytics"
    movement: "changed"
    owner: "Self-Service Analytics Lead"
    review_horizon: "3 месяца"
    rationale: "Power BI can remain as a reporting UI if it reads governed marts, not raw DWH."
    risk: "Existing customizations can keep DWH coupling alive."
    business_impact: "Protects analyst productivity during migration."
  - id: sql-server-2008
    name: "SQL Server 2008 DWH"
    ring: "Hold"
    quadrant: "Data & Analytics"
    movement: "down"
    owner: "Migration Lead"
    review_horizon: "ежемесячно"
    rationale: "Legacy DWH contains business logic and sensitive data but blocks domain autonomy."
    risk: "Security, license and migration risks remain until decommissioned."
    business_impact: "Keep only as migration bridge and historical source."
  - id: powerbuilder
    name: "PowerBuilder"
    ring: "Hold"
    quadrant: "Integration & Delivery"
    movement: "down"
    owner: "Clinics Domain Owner"
    review_horizon: "ежемесячно"
    rationale: "Legacy clinic operator UI tied to DWH-centric workflows."
    risk: "Hard to hire, hard to change, high operational dependency."
    business_impact: "Replace through domain applications to improve clinic change speed."
  - id: apache-camel
    name: "Apache Camel as legacy ESB"
    ring: "Hold"
    quadrant: "Integration & Delivery"
    movement: "down"
    owner: "Migration Lead"
    review_horizon: "ежемесячно"
    rationale: "Old integration layer should not be the target event backbone."
    risk: "Direct reuse can recreate central coupling."
    business_impact: "Use only behind anti-corruption layers during migration."
  - id: power-bi-dwh
    name: "Power BI over DWH"
    ring: "Hold"
    quadrant: "Data & Analytics"
    movement: "down"
    owner: "Self-Service Analytics Lead"
    review_horizon: "ежемесячно"
    rationale: "Current BI customizations depend on slow DWH transformations."
    risk: "Keeps report latency and DWH bottleneck."
    business_impact: "Migrate reports to governed marts and self-service portal."
  - id: data-mesh
    name: "Data Mesh"
    ring: "Adopt"
    quadrant: "Methods & Governance"
    movement: "new"
    owner: "Enterprise Architect"
    review_horizon: "6 месяцев"
    rationale: "Operating model for domain-owned data products."
    risk: "Fails without domain owners, budget and platform enablement."
    business_impact: "Lets business directions evolve independently while sharing KPIs."
  - id: event-driven-architecture
    name: "Event-Driven Architecture"
    ring: "Adopt"
    quadrant: "Methods & Governance"
    movement: "new"
    owner: "Enterprise Architect"
    review_horizon: "6 месяцев"
    rationale: "Target interaction model for weakly-coupled domains, domain events and reactive flows."
    risk: "Can degrade into unmanaged message exchange without contracts, ownership and DLQ process."
    business_impact: "Speeds integration of fintech, clinics, AI, pharma and device domains without adding DWH logic."
  - id: self-service-bi
    name: "Self-service BI"
    ring: "Trial"
    quadrant: "Data & Analytics"
    movement: "changed"
    owner: "Self-Service Analytics Lead"
    review_horizon: "3 месяца"
    rationale: "Business users need governed report building through DataHub/Dremio marts instead of direct DWH customizations."
    risk: "Uncontrolled ad-hoc access can leak sensitive data or drive cloud cost without guardrails."
    business_impact: "Reduces report lead time and supports the one-year self-service portal goal."
  - id: adr-rfc
    name: "ADR/RFC for technology changes"
    ring: "Adopt"
    quadrant: "Methods & Governance"
    movement: "new"
    owner: "Architecture Board"
    review_horizon: "6 месяцев"
    rationale: "Controls movement across radar rings and documents tradeoffs."
    risk: "Can become bureaucracy if not tied to review cadence."
    business_impact: "Keeps technology decisions auditable and explainable."
